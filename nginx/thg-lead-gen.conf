# ============================================================
# nginx config — THG Lead Gen (VPS Production)
# Path on VPS: /etc/nginx/sites-available/thg-lead-gen
#
# Setup:
#   cp /root/THG_tool/nginx/thg-lead-gen.conf /etc/nginx/sites-available/thg-lead-gen
#   ln -sf /etc/nginx/sites-available/thg-lead-gen /etc/nginx/sites-enabled/thg-lead-gen
#   nginx -t && systemctl reload nginx
#   certbot install --cert-name thg-tool.duckdns.org --nginx
# ============================================================

upstream thg_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name thg-tool.duckdns.org;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name thg-tool.duckdns.org;

    # SSL certs managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/thg-tool.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thg-tool.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-XSS-Protection          "1; mode=block";

    # ── Timeouts ────────────────────────────────────────────────────────
    proxy_connect_timeout   10s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;
    send_timeout            120s;

    # ── Buffering ───────────────────────────────────────────────────────
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # ── Connection reuse ────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection "";

    # ── Pass headers ────────────────────────────────────────────────────
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;

    # ── Static files ─────────────────────────────────────────────────────
    location /static/ {
        alias /root/THG_tool/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Long-running AI/scan endpoints — extended timeout ───────────────
    location ~ ^/api/(agents/generate-reply|scan|leads/classify) {
        proxy_pass          http://thg_app;
        proxy_read_timeout  150s;
        proxy_send_timeout  150s;
    }

    # ── All other traffic ───────────────────────────────────────────────
    location / {
        proxy_pass          http://thg_app;
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    location = /50x.html {
        return 503 '{"success":false,"error":"Server đang khởi động lại, vui lòng thử lại sau 15 giây"}';
        add_header Content-Type application/json;
    }

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 4;

    # ── Request size limit ──────────────────────────────────────────────
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   10s;
}
