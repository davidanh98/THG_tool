# ============================================================
# nginx config — THG Lead Gen (VPS Production)
# Path on VPS: /etc/nginx/sites-available/thg-lead-gen
#
# Setup:
#   sudo cp nginx/thg-lead-gen.conf /etc/nginx/sites-available/thg-lead-gen
#   sudo ln -sf /etc/nginx/sites-available/thg-lead-gen /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream thg_app {
    server 127.0.0.1:3000;

    # Keep connections alive to Node.js — reduces connection overhead
    keepalive 32;
}

server {
    listen 80;
    server_name _;          # Replace with your domain, e.g.: thg.yourdomain.com

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # ── Timeouts — the key fix for 504 ─────────────────────────────────
    # Default nginx timeout is 60s — not enough for AI API + Playwright scans.
    proxy_connect_timeout   10s;    # Time to connect to upstream Node.js
    proxy_send_timeout      120s;   # Time to send request to upstream
    proxy_read_timeout      120s;   # Time to wait for response (the 504 culprit)
    send_timeout            120s;

    # ── Buffering — reduce memory pressure on Node.js ──────────────────
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # ── Connection reuse ────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection "";

    # ── Pass headers ────────────────────────────────────────────────────
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;

    # ── Static files served by nginx directly (faster than Node) ───────
    location /static/ {
        alias /root/THG_tool/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check (bypass rate limit + logging) ──────────────────────
    location = /api/stats {
        proxy_pass          http://thg_app;
        proxy_read_timeout  5s;     # Fast timeout for health checks
        access_log          off;
    }

    # ── Long-running AI/scan endpoints — extended timeout ───────────────
    location ~ ^/api/(agents/generate-reply|scan|leads/classify) {
        proxy_pass          http://thg_app;
        proxy_read_timeout  150s;   # 2.5 min — AI API can be slow
        proxy_send_timeout  150s;
    }

    # ── All other API + app traffic ─────────────────────────────────────
    location / {
        proxy_pass          http://thg_app;

        # Graceful error page if Node.js is down
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    location = /50x.html {
        return 503 '{"success":false,"error":"Server đang khởi động lại, vui lòng thử lại sau 15 giây"}';
        add_header Content-Type application/json;
    }

    # ── Gzip compression ────────────────────────────────────────────────
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript;
    gzip_min_length     1024;
    gzip_comp_level     4;

    # ── Request size limit ──────────────────────────────────────────────
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   10s;
}
