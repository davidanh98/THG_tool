<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | THG Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo .icon {
            font-size: 3rem;
        }

        .logo h1 {
            margin-top: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-wrap {
            margin-bottom: 18px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .remember-row label {
            margin: 0;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.82rem;
        }

        .remember-row input {
            width: auto;
            margin-right: 6px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            margin-bottom: 16px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.85rem;
            display: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .footer-link a {
            color: #a78bfa;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .security-badge span {
            padding: 2px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="icon">🏗️</div>
            <h1>THG Intelligence</h1>
            <p>AI-Powered Sales Platform</p>
        </div>

        <div class="error-msg" id="errMsg"></div>

        <form id="loginForm" onsubmit="doLogin(event)">
            <div class="input-wrap">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="input-wrap">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div class="remember-row">
                <label><input type="checkbox" id="remember" checked> Nhớ đăng nhập (30 ngày)</label>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">🔑 Đăng nhập</button>
        </form>

        <div class="footer-link">
            Chưa có tài khoản? <span style="color:rgba(255,255,255,0.3)">Li&#234;n h&#7879; Admin THG &#273;&#7875; &#273;&#432;&#7907;c c&#7845;p t&#224;i kho&#7843;n.</span>
        </div>

        <div class="security-badge">
            <span>🔒 JWT Encrypted</span>
            <span>✅ 30-day session</span>
            <span>🛡️ THG Server</span>
        </div>
    </div>

    <script>
        // Check if already logged in
        const existingToken = localStorage.getItem('thg_token');
        if (existingToken) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + existingToken } })
                .then(r => r.json())
                .then(d => { if (d.ok) window.location.href = '/'; })
                .catch(() => { });
        }

        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errMsg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = '⏳ Đang đăng nhập...';
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (data.ok) {
                    localStorage.setItem('thg_token', data.token);
                    localStorage.setItem('thg_user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || 'Đăng nhập thất bại.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '🔑 Đăng nhập';
                }
            } catch (err) {
                errEl.textContent = 'Không kết nối được server. Thử lại sau.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔑 Đăng nhập';
            }
        }
    </script>
</body>

</html>
