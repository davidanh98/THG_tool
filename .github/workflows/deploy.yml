name: THG Deploy (PM2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Code to /root/THG_tool
        run: |
          echo "📦 Syncing code to /root/THG_tool..."
          rsync -a --delete \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.pm2' \
            ${{ github.workspace }}/ /root/THG_tool/

          # Sync config files from data/ (cookies, groups — NOT leads.db)
          mkdir -p /root/THG_tool/data
          mkdir -p /root/THG_tool/data/sessions
          mkdir -p /root/THG_tool/logs
          cp -f ${{ github.workspace }}/data/prod_groups.json /root/THG_tool/data/prod_groups.json 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/fb_cookies_*.json /root/THG_tool/data/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/recovery_codes_*.json /root/THG_tool/data/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/ua_*.txt /root/THG_tool/data/ 2>/dev/null || true
          echo "✅ Code synced!"

          # Update OpenAI API key in .env
          if [ ! -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            if grep -q 'OPENAI_API_KEY=' /root/THG_tool/.env; then
              sed -i "s|OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" /root/THG_tool/.env
            else
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> /root/THG_tool/.env
            fi
          fi
          
          # Update Gemini API key in .env
          if [ ! -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            if grep -q 'GEMINI_API_KEY=' /root/THG_tool/.env; then
              sed -i "s|GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|" /root/THG_tool/.env
            else
              echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> /root/THG_tool/.env
            fi
          fi

          # Update SerpAPI key in .env
          if [ ! -z "${{ secrets.SERPAPI_KEY }}" ]; then
            if grep -q 'SERPAPI_KEY=' /root/THG_tool/.env; then
              sed -i "s|SERPAPI_KEY=.*|SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}|" /root/THG_tool/.env
            else
              echo "SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}" >> /root/THG_tool/.env
            fi
          fi
          
          echo "🔑 API keys updated in .env"


          # Update NGINX config
          echo "🌐 Reloading NGINX configuration..."
          sudo cp -f /root/THG_tool/nginx/thg-lead-gen.conf /etc/nginx/sites-available/thg-lead-gen 2>/dev/null || true
          sudo ln -sf /etc/nginx/sites-available/thg-lead-gen /etc/nginx/sites-enabled/thg-lead-gen 2>/dev/null || true
          sudo nginx -t && sudo systemctl reload nginx || echo "⚠️ NGINX reload failed"

      - name: Install Dependencies
        run: |
          cd /root/THG_tool
          npm install --omit=dev 2>&1 | tail -5
          echo "✅ Backend dependencies installed"

      - name: Build React Frontend
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd /root/THG_tool/frontend
          npm install 2>&1 | tail -3
          npm run build
          echo "✅ Frontend built → frontend/dist/"

      - name: Restart PM2 Processes
        run: |
          cd /root/THG_tool

          # Verify frontend build exists
          ls -la frontend/dist/index.html 2>/dev/null || echo "❌ index.html NOT FOUND!"

          which pm2 || sudo npm install -g pm2
          export PM2_HOME=/root/.pm2

          # Stop all processes
          sudo env PM2_HOME=/root/.pm2 pm2 kill 2>/dev/null || true
          sleep 1
          fuser -k 3000/tcp 2>/dev/null || true
          pkill -f 'node backend/' 2>/dev/null || true
          PORT_PID=$(lsof -t -i:3000 2>/dev/null || true)
          if [ ! -z "$PORT_PID" ]; then
            kill -9 $PORT_PID 2>/dev/null || true
          fi
          sleep 4

          # Fresh start
          sudo env PM2_HOME=/root/.pm2 pm2 start devops/ecosystem.config.js
          sudo env PM2_HOME=/root/.pm2 pm2 save

          # Health check
          echo "⏳ Waiting for API..."
          sleep 5
          for i in $(seq 1 10); do
            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Health check passed in $((i*2+5))s"
              sudo env PM2_HOME=/root/.pm2 pm2 status
              break
            fi
            echo "  [$((i*2+5))s] HTTP ${HTTP}..."
          done

          echo "📋 PM2 API logs:"
          sudo env PM2_HOME=/root/.pm2 pm2 logs thg-api --lines 10 --nostream 2>/dev/null || true
          echo "🎉 THG Deploy hoàn tất!"