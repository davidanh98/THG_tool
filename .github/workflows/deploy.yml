name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - 'ecosystem.config.js'
      - '.github/workflows/**'

# Cancel older deploy if a newer commit arrives
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # ─── CI: Validate code ────────────────────────────────────────────────────
  ci:
    name: 🔍 CI — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'    # Caches ~/.npm — skips network download when lockfile unchanged

      - name: Install
        run: npm ci --production

      - name: Validate
        run: |
          node --check src/server.js && \
          node --check src/index.js && \
          node --check src/data_store/database.js && \
          node -e "require('./src/data_store/database'); require('./src/config');" && \
          echo "✅ All checks passed"

  # ─── CD: Deploy to VPS ───────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          script: |
            set -e
            cd /root/THG_tool

            # ── 1. Pull code ──────────────────────────────────────────────
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            echo "✓ Code: $(git rev-parse --short HEAD)"

            # ── 2. Auto-apply nginx config (skip if unchanged) ────────────
            NGINX_CONF="nginx/thg-lead-gen.conf"
            NGINX_DEST="/etc/nginx/sites-available/thg-lead-gen"
            NEW_NGINX_HASH=$(md5sum "$NGINX_CONF" | cut -d' ' -f1)
            OLD_NGINX_HASH=$(cat /root/.thg_nginx_hash 2>/dev/null || echo "none")
            if [ "$NEW_NGINX_HASH" != "$OLD_NGINX_HASH" ]; then
              echo "✓ nginx config changed → applying..."
              mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
              cp "$NGINX_CONF" "$NGINX_DEST"
              ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/thg-lead-gen
              rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
              nginx -t && systemctl reload nginx
              echo "$NEW_NGINX_HASH" > /root/.thg_nginx_hash
              echo "✓ nginx reloaded with new config"
            else
              echo "✓ nginx config unchanged → skipping"
            fi

            # ── 3. Smart npm install (skip if lockfile unchanged) ─────────
            NEW_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
            OLD_HASH=$(cat /root/.thg_pkg_hash 2>/dev/null || echo "none")
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              echo "✓ Dependencies changed → npm ci"
              npm ci --production --silent
              echo "$NEW_HASH" > /root/.thg_pkg_hash
            else
              echo "✓ Dependencies unchanged → skipping npm install"
            fi

            # ── 3. Inject .env sprint config ──────────────────────────────
            sed -i '/^ENABLED_PLATFORMS=/d;/^MAX_POSTS_PER_SCAN=/d;/^SV_DAILY_LIMIT=/d;/^SCRAPE_MODE=/d;/^FB_EMAIL=/d;/^FB_PASSWORD=/d' .env 2>/dev/null || true
            printf 'ENABLED_PLATFORMS=facebook\nMAX_POSTS_PER_SCAN=200\nSV_DAILY_LIMIT=1100\nSCRAPE_MODE=self-hosted\nFB_EMAIL=manyhope0502@gmail.com\nFB_PASSWORD=anhdeptrai7788\n' >> .env

            # ── 4. Reset groups cache ─────────────────────────────────────
            rm -f data/groups.db data/groups.db-shm data/groups.db-wal

            # ── 5. Zero-downtime reload ───────────────────────────────────
            pm2 reload ecosystem.config.js --update-env 2>/dev/null \
              || pm2 restart ecosystem.config.js --update-env 2>/dev/null \
              || (pm2 delete all 2>/dev/null || true && pm2 start ecosystem.config.js)
            pm2 save --force

            # ── 6. Health check ───────────────────────────────────────────
            PORT=$(grep '^PORT=' .env 2>/dev/null | cut -d= -f2 | tr -d '[:space:]' || echo 3000)
            echo "Health check → http://localhost:${PORT}/api/stats"
            for i in 1 2 3 4 5; do
              sleep 3
              HTTP=$(curl -so /dev/null -w "%{http_code}" "http://localhost:${PORT}/api/stats" 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Deploy #${{ github.run_number }} healthy (HTTP 200)"
                pm2 list
                exit 0
              fi
              echo "  ⏳ Attempt ${i}/5 — HTTP ${HTTP}"
            done

            # Auto-rollback if health check fails
            echo "🔴 Health check failed — rolling back..."
            PREV=$(cat /root/.thg_last_good_sha 2>/dev/null || echo "")
            if [ -n "$PREV" ]; then
              git reset --hard "$PREV"
              npm ci --production --silent 2>/dev/null || true
              pm2 reload ecosystem.config.js --update-env 2>/dev/null || true
              echo "⚠️  Rolled back to $PREV"
            fi
            pm2 logs thg-lead-gen --lines 30 --nostream
            exit 1

      - name: Save good SHA
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          script: echo "${{ github.sha }}" > /root/.thg_last_good_sha

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          OUTCOME="${{ job.status }}"
          ICON=$([ "$OUTCOME" = "success" ] && echo "✅" || echo "❌")
          echo "## ${ICON} Deploy #${{ github.run_number }} — ${OUTCOME}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
