name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          command_timeout: 8m
          script: |
            set -e
            cd /root/THG_tool

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── Detect if rebuild is needed (package.json or Dockerfile changed) ──
            CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || echo "")
            NEEDS_REBUILD=$(echo "$CHANGED" | grep -E "^(package|Dockerfile)" || true)

            if [ -n "$NEEDS_REBUILD" ]; then
              echo "🔨 package.json or Dockerfile changed — rebuilding image..."
              docker compose build --pull app
              docker compose up -d --force-recreate
            else
              echo "⚡ Hot-sync: copying src/ + public/ + scripts/ into container..."
              # Stop before copy to avoid race condition
              docker stop thg-lead-gen 2>/dev/null || true
              docker start thg-lead-gen 2>/dev/null || docker compose up -d
              docker cp src/. thg-lead-gen:/app/src/
              docker cp public/. thg-lead-gen:/app/public/
              docker cp scripts/. thg-lead-gen:/app/scripts/
              docker restart thg-lead-gen
            fi

            echo "=== Syncing group list ==="
            sleep 5
            docker exec thg-lead-gen node scripts/sync-groups.js || true

            echo "⏳ Waiting for container to be healthy..."
            for i in $(seq 1 20); do
              sleep 3
              HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Deploy #$GITHUB_RUN_NUMBER done! HTTP 200 in $((i*3))s"
                docker ps --filter name=thg-lead-gen --format "table {{.Names}}\t{{.Status}}"
                exit 0
              fi
              echo "  [$((i*3))s] HTTP ${HTTP}..."
            done

            echo "⚠️  Health check inconclusive after 60s — showing logs:"
            docker logs thg-lead-gen --tail 30
            # Don't fail the deploy — container may still be starting up
            exit 0

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "## 🚀 Deploy #${{ github.run_number }} — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
