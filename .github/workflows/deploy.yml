name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          script: |
            cd /root/THG_tool
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            echo "📦 Installing dependencies..."
            npm install --production
            echo "🛑 Stopping all PM2 processes..."
            pm2 delete all 2>/dev/null || true
            echo "📝 Forcing FB-only in .env (using sed)..."
            sed -i '/^ENABLED_PLATFORMS=/d' .env 2>/dev/null || true
            sed -i '/^MAX_POSTS_PER_SCAN=/d' .env 2>/dev/null || true
            echo "ENABLED_PLATFORMS=facebook" >> .env
            echo "MAX_POSTS_PER_SCAN=60" >> .env
            echo "✅ .env config:"
            grep -E "^ENABLED_PLATFORMS=|^MAX_POSTS_PER_SCAN=" .env
            echo "🔄 Starting fresh (using ecosystem.config.js)..."
            pm2 start ecosystem.config.js
            pm2 save
            echo "✅ Deploy complete!"
            pm2 list


