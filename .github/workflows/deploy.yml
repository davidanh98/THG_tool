name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          script: |
            cd /root/THG_tool
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            echo "📦 Installing dependencies..."
            npm install --production
            echo "🎭 Installing Playwright Chromium + system deps..."
            npx playwright install --with-deps chromium
            echo "🛑 Stopping all PM2 processes..."
            pm2 delete all 2>/dev/null || true
            echo "📝 Setting sprint config in .env..."
            sed -i '/^ENABLED_PLATFORMS=/d' .env 2>/dev/null || true
            sed -i '/^MAX_POSTS_PER_SCAN=/d' .env 2>/dev/null || true
            sed -i '/^SV_DAILY_LIMIT=/d' .env 2>/dev/null || true
            sed -i '/^SCRAPE_MODE=/d' .env 2>/dev/null || true
            sed -i '/^FB_EMAIL=/d' .env 2>/dev/null || true
            sed -i '/^FB_PASSWORD=/d' .env 2>/dev/null || true
            echo "ENABLED_PLATFORMS=facebook" >> .env
            echo "MAX_POSTS_PER_SCAN=200" >> .env
            echo "SV_DAILY_LIMIT=1100" >> .env
            echo "SCRAPE_MODE=sociavault" >> .env
            echo "FB_EMAIL=manyhope0502@gmail.com" >> .env
            echo "FB_PASSWORD=anhdeptrai7788" >> .env
            echo "✅ .env config:"
            grep -E "^ENABLED_PLATFORMS=|^MAX_POSTS_PER_SCAN=|^SV_DAILY_LIMIT=|^SCRAPE_MODE=|^FB_EMAIL=" .env
            echo "🗑️ Removing old groups.db to force re-seed..."
            rm -f data/groups.db data/groups.db-shm data/groups.db-wal
            echo "🔄 Starting fresh (using ecosystem.config.js)..."
            pm2 start ecosystem.config.js
            pm2 save
            echo "✅ Deploy complete!"
            pm2 list

