name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - '.github/workflows/**'

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          command_timeout: 5m
          script: |
            set -e
            cd /root/THG_tool

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            npm ci --production --silent

            echo "🔄 Restarting app with PM2..."
            if pm2 list | grep -q "thg-lead-gen"; then
              pm2 reload thg-lead-gen --update-env
            else
              pm2 start src/index.js --name thg-lead-gen --max-memory-restart 800M
              pm2 save
            fi

            echo "⏳ Waiting for app to start..."
            sleep 5
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/api/stats 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Deploy #$GITHUB_RUN_NUMBER successful! HTTP 200"
            else
              echo "⚠️  HTTP ${HTTP} — checking logs..."
              pm2 logs thg-lead-gen --lines 20 --nostream
            fi

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "## 🚀 Deploy #${{ github.run_number }} — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
