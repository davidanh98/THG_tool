name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - 'ecosystem.config.js'
      - 'nginx/**'
      - '.github/workflows/**'

# Cancel older deploy if a newer commit arrives
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # ─── CI: Syntax validation ────────────────────────────────────────────────────
  ci:
    name: 🔍 CI — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --production

      - name: Syntax check
        run: |
          node --check src/server.js
          node --check src/index.js
          node --check src/data_store/database.js
          echo "✅ Syntax OK"

  # ─── CD: Deploy to VPS ───────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          command_timeout: 5m
          script: |
            set -e
            cd /root/THG_tool

            # ── 1. Pull latest code ───────────────────────────────────────
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            echo "✓ Code: $(git rev-parse --short HEAD)"

            # ── 2. Auto-apply nginx config if changed ─────────────────────
            NGINX_CONF="nginx/thg-lead-gen.conf"
            NGINX_DEST="/etc/nginx/sites-available/thg-lead-gen"
            if [ -f "$NGINX_CONF" ]; then
              NEW_NGINX=$(md5sum "$NGINX_CONF" | cut -d' ' -f1)
              OLD_NGINX=$(cat /root/.thg_nginx_hash 2>/dev/null || echo "none")
              if [ "$NEW_NGINX" != "$OLD_NGINX" ]; then
                mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
                cp "$NGINX_CONF" "$NGINX_DEST"
                ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/thg-lead-gen
                rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
                nginx -t && systemctl reload nginx
                echo "$NEW_NGINX" > /root/.thg_nginx_hash
                echo "✓ nginx config updated and reloaded"
              else
                echo "✓ nginx config unchanged"
              fi
            fi

            # ── 3. Install deps only if package-lock.json changed ─────────
            NEW_PKG=$(md5sum package-lock.json | cut -d' ' -f1)
            OLD_PKG=$(cat /root/.thg_pkg_hash 2>/dev/null || echo "none")
            if [ "$NEW_PKG" != "$OLD_PKG" ]; then
              npm ci --production --silent
              echo "$NEW_PKG" > /root/.thg_pkg_hash
              echo "✓ Dependencies updated"
            else
              echo "✓ Dependencies unchanged"
            fi

            # ── 4. Inject .env config ─────────────────────────────────────
            sed -i '/^ENABLED_PLATFORMS=/d;/^MAX_POSTS_PER_SCAN=/d;/^SV_DAILY_LIMIT=/d;/^SCRAPE_MODE=/d;/^FB_EMAIL=/d;/^FB_PASSWORD=/d' .env 2>/dev/null || true
            printf 'ENABLED_PLATFORMS=facebook\nMAX_POSTS_PER_SCAN=200\nSV_DAILY_LIMIT=1100\nSCRAPE_MODE=self-hosted\nFB_EMAIL=manyhope0502@gmail.com\nFB_PASSWORD=anhdeptrai7788\n' >> .env

            # ── 5. Reset groups cache ─────────────────────────────────────
            rm -f data/groups.db data/groups.db-shm data/groups.db-wal

            # ── 6. Reload PM2 ─────────────────────────────────────────────
            pm2 reload ecosystem.config.js --update-env 2>/dev/null \
              || pm2 restart ecosystem.config.js --update-env 2>/dev/null \
              || (pm2 delete all 2>/dev/null; pm2 start ecosystem.config.js)
            pm2 save --force || true

            # ── 7. Health check (non-fatal — app may take 30s to start) ───
            echo "⏳ Waiting 30s for app to start..."
            sleep 30
            PORT=$(grep '^PORT=' .env 2>/dev/null | cut -d= -f2 | tr -d '[:space:]' || echo 3000)
            HTTP=$(curl -so /dev/null -w "%{http_code}" "http://localhost:${PORT}/api/stats" 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ App healthy (HTTP 200)"
            else
              echo "⚠️  App returned HTTP ${HTTP} — showing PM2 status:"
              pm2 list
              pm2 logs thg-lead-gen --lines 15 --nostream || true
              # Non-fatal: don't exit 1 — deploy succeeded even if health check inconclusive
            fi

            echo "✅ Deploy #${{ github.run_number }} complete!"

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "## 🚀 Deploy #${{ github.run_number }} — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
