name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'ecosystem.config.js'
      - '.github/workflows/**'

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          command_timeout: 10m
          script: |
            set -e
            cd /root/THG_tool

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── Detect if full rebuild is needed ──
            CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || echo "")
            NEEDS_REBUILD=$(echo "$CHANGED" | grep -E "^(package|Dockerfile)" || true)

            if [ -n "$NEEDS_REBUILD" ]; then
              echo "🔨 package.json or Dockerfile changed — full rebuild..."
              docker compose build --pull
              docker compose up -d --force-recreate
            else
              echo "⚡ Hot-sync: copying files into RUNNING containers..."

              # Copy source into all 3 containers (they share the same image)
              for CONTAINER in thg-api thg-scraper thg-ai-worker; do
                if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
                  echo "  📦 Syncing ${CONTAINER}..."
                  docker cp src/. ${CONTAINER}:/app/src/
                  docker cp public/. ${CONTAINER}:/app/public/
                  docker cp scripts/. ${CONTAINER}:/app/scripts/
                  docker cp ecosystem.config.js ${CONTAINER}:/app/ecosystem.config.js
                else
                  echo "  ⚠️ ${CONTAINER} not running — will recreate"
                fi
              done

              echo "🔄 Restarting all services..."
              docker compose up -d --force-recreate
            fi

            echo "=== Syncing group list ==="
            sleep 5
            docker exec thg-api node scripts/sync-groups.js 2>/dev/null || true

            echo "⏳ Waiting for API to be healthy..."
            for i in $(seq 1 20); do
              sleep 3
              HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Deploy #$GITHUB_RUN_NUMBER done! HTTP 200 in $((i*3))s"
                echo ""
                echo "=== Running Services ==="
                docker compose ps
                exit 0
              fi
              echo "  [$((i*3))s] HTTP ${HTTP}..."
            done

            # ── ROLLBACK: if health check fails ──
            echo "⚠️ Health check failed after 60s — attempting recovery..."
            docker compose restart api
            sleep 15
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Recovery successful after restart!"
              exit 0
            fi

            echo "❌ Recovery failed — showing logs:"
            docker compose logs --tail 30 api
            exit 0

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "## 🚀 Deploy #${{ github.run_number }} — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Architecture** | 3-Tier (API + Scraper + AI Worker) |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
